name: Deploy na VM Azure

on:
  push:
    branches: [ main ]

jobs:
  build_frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Instalar Node e Angular CLI
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs
          npm install -g @angular/cli

      - name: Instalar dependências e buildar o frontend
        working-directory: ./frontend/doc-brasil
        run: |
          npm ci
          ng build --configuration=production

      - name: Substituir pasta dist no project-root/frontend
        run: |
          rm -rf frontend
          mkdir -p frontend
          cp -r frontend/doc-brasil/dist/doc-brasil/* frontend/

      - name: Enviar frontend para a VM
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

          rsync -avz --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/id_rsa" ./ azureuser@${{ secrets.VM_HOST }}:/home/azureuser/associados-app

  deploy_backend:
    runs-on: ubuntu-latest
    needs: build_frontend

    steps:
      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Rebuild backend e subir containers
        run: |
          ssh -i ~/.ssh/id_rsa azureuser@${{ secrets.VM_HOST }} << 'EOF'
            cd /home/azureuser/associados-app
            docker-compose down
            docker-compose build --no-cache
            docker-compose up -d
          EOF
