server {
    listen 80;
    server_name appdocdobrasil.com.br;

    # Desafios do Let's Encrypt
    location /.well-known/acme-challenge/ {
        alias /var/www/html/.well-known/acme-challenge/;
        try_files $uri =404;
    }

    # Redireciona tudo para HTTPS (exceto o desafio)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name appdocdobrasil.com.br;

    ssl_certificate /etc/letsencrypt/live/appdocdobrasil.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/appdocdobrasil.com.br/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Serve o frontend Angular
    location / {
        proxy_pass http://associados_frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Redireciona chamadas de API para o API Gateway
    location /api/ {
        proxy_pass http://associados_api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
